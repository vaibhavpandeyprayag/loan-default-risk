name: credit-risk

channels:
  - defaults
  - conda-forge

dependencies:
  - python=3.9

  # Core libraries
  - numpy=1.23.5
  - pandas=1.5.3
  - matplotlib=3.7.1

  # ML & Stats
  - scikit-learn=1.2.2
  - statsmodels=0.14.0

  # Notebook support (optional but recommended)
  - jupyterlab=3.6.3
  - ipykernel=6.25.0

  # Utilities
  - pip

  # (Optional pip installs if needed later)
  - pip:
      - seaborn==0.12.2